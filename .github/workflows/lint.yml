# .github/workflows/lint.yml
name: Lint
on:
  push: { branches: [main, feat/v4] }
  pull_request: { branches: [main] }
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with: { go-version: '1.26' }
      - run: go build ./...
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with: { version: latest }
  web:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with: { node-version: '24' }
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with: { go-version: '1.26' }
      - name: install restic >= 0.17 (apt's restic is too old for --insecure-no-password)
        run: |
          RESTIC_VERSION=0.17.3
          # SHA256 for restic_0.17.3_linux_amd64.bz2 from the upstream SHA256SUMS
          # (https://github.com/restic/restic/releases/download/v0.17.3/SHA256SUMS);
          # keep in sync with RESTIC_SHA256_AMD64 in the Dockerfile.
          RESTIC_SHA256=5097faeda6aa13167aae6e36efdba636637f8741fed89bbf015678334632d4d3
          curl -fsSL -o restic.bz2 "https://github.com/restic/restic/releases/download/v${RESTIC_VERSION}/restic_${RESTIC_VERSION}_linux_amd64.bz2"
          echo "${RESTIC_SHA256}  restic.bz2" | sha256sum -c -
          bunzip2 restic.bz2
          sudo install -m 0755 restic /usr/local/bin/restic
          restic version
      - run: go test ./...
