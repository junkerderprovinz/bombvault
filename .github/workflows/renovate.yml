name: Renovate

on:
  schedule:
    # Twice daily (UTC). 01:00 UTC always falls inside the repo's
    # "before 6am on monday" (Europe/Vienna) PR window in both CET and CEST,
    # so the Monday PR batch is honoured; both runs keep the Dependency
    # Dashboard and its checkboxes responsive.
    - cron: "0 1,13 * * *"
  # Manual trigger - use this for the first run right after adding the
  # RENOVATE_TOKEN secret so the Dependency Dashboard appears immediately.
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate log level"
        required: false
        default: "info"
        type: choice
        options:
          - debug
          - info
          - warn
  # Re-run promptly when the Renovate config or this workflow changes.
  push:
    branches: [main]
    paths:
      - "renovate.json"
      - ".github/workflows/renovate.yml"

permissions:
  contents: read

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Check for RENOVATE_TOKEN
        id: check
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: |
          if [ -z "$RENOVATE_TOKEN" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::RENOVATE_TOKEN secret is not set - skipping Renovate. Add a PAT as the RENOVATE_TOKEN repository secret to enable dependency updates."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Self-hosted Renovate
        if: steps.check.outputs.present == 'true'
        uses: renovatebot/github-action@v46.1.19
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          # Only this repository - never autodiscover across the account
          # (krusader still uses Mend and must not be touched).
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          LOG_LEVEL: ${{ github.event.inputs.logLevel || 'info' }}
