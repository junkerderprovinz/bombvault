name: Build Docker Image

# Build the multi-arch image and, on main, push it to GHCR so it can be pulled on the
# Unraid box (e.g. for the integration spike). Pull requests build only (no push).
on:
  push:
    branches: [main]
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "docs/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Boot smoke test: a green build is not a booting container. Build the amd64
  # image, run it, and confirm it serves /api/health before we push :latest /
  # the release tag. The push job depends on this, so a non-booting image can
  # never reach the registry.
  smoke:
    name: Boot smoke test (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build amd64 image (load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: bombvault:smoke
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run container + health check
        run: |
          docker run -d --name bv-smoke \
            -e APP_KEY="$(openssl rand -hex 32)" \
            -e HTTP_ONLY=true \
            -p 3000:3000 bombvault:smoke
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "✓ container is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "✗ container did not become healthy in time"
          docker logs bv-smoke || true
          exit 1
      - name: Verify tini is PID 1 (zombie reaper, #35)
        run: |
          # BombVault shells out to restic, which forks rclone for off-site repos.
          # A cancelled/killed restic orphans its rclone child onto PID 1; if PID 1
          # is not a reaping init those pile up as [rclone] <defunct> (#35). tini as
          # PID 1 reaps them. /proc/1/comm is the live proof the ENTRYPOINT took.
          pid1=$(docker exec bv-smoke cat /proc/1/comm)
          echo "PID 1 is: $pid1"
          if [ "$pid1" != "tini" ]; then
            echo "✗ PID 1 is '$pid1', not tini — the zombie reaper is missing (#35 would regress)"
            exit 1
          fi
          echo "✓ tini is PID 1 — orphaned rclone/ssh grandchildren get reaped"
      - name: Cleanup
        if: always()
        run: docker rm -f bv-smoke || true

  build:
    name: Build (amd64 + arm64)
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Push only on main / manual runs, never from pull requests.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub mirror — active only once DOCKERHUB_USERNAME (variable) and
      # DOCKERHUB_TOKEN (secret) are set together; otherwise skipped (GHCR-only).
      - name: Log in to Docker Hub
        if: ${{ github.event_name != 'pull_request' && vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE }}
            name=docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }},enable=${{ vars.DOCKERHUB_USERNAME != '' }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # Stamp a meaningful version into the binary. Tag builds use the tag
      # (e.g. v3.1.0); main builds (which publish :latest) use the latest release
      # tag plus the short SHA (e.g. v3.1.0+main.4c0c987) instead of the literal
      # "main", so the log banner + WebUI show a real version (issue #22).
      - name: Compute version
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            v="${{ github.ref_name }}"
          else
            tag=$(gh release view -R "${{ github.repository }}" --json tagName --jq .tagName 2>/dev/null || true)
            sha=$(printf '%s' "${{ github.sha }}" | cut -c1-7)
            if [ -n "$tag" ]; then v="${tag}+main.${sha}"; else v="0.0.0+main.${sha}"; fi
          fi
          echo "v=$v" >> "$GITHUB_OUTPUT"
          echo "computed version: $v"
      - name: Build multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.ver.outputs.v }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Mirror the GitHub README to the Docker Hub repo's full description (same
      # text as on GitHub; relative image/link paths completed to absolute so they
      # render on Docker Hub). Editing the description needs a credential the push
      # token (DOCKERHUB_TOKEN) lacks — it returns 403 — so this uses a separate
      # DOCKERHUB_PASSWORD secret (Docker Hub account password, or a PAT scoped to
      # edit repos). Skipped until that secret is set, so a missing credential
      # never fails the build.
      - name: Docker Hub description sync ready?
        id: dhdesc
        if: ${{ vars.DOCKERHUB_USERNAME != '' && github.event_name != 'pull_request' }}
        env:
          PW: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: |
          if [ -n "$PW" ]; then echo "go=true" >> "$GITHUB_OUTPUT"; else echo "DOCKERHUB_PASSWORD not set — skipping Docker Hub description sync"; echo "go=false" >> "$GITHUB_OUTPUT"; fi
      - name: Sync README to Docker Hub
        if: ${{ steps.dhdesc.outputs.go == 'true' }}
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          short-description: "Backup and full disaster recovery for Unraid: Docker containers, KVM VMs and the USB flash."
          enable-url-completion: true
