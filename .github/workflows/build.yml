name: Build Docker Image

# Build the multi-arch image and, on main, push it to GHCR so it can be pulled on the
# Unraid box (e.g. for the integration spike). Pull requests build only (no push).
on:
  push:
    branches: [main, feat/go-rewrite]
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "docs/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Boot smoke test: a green build is not a booting container. Build the amd64
  # image, run it, and confirm it serves /api/health before we push :latest /
  # the release tag. The push job depends on this, so a non-booting image can
  # never reach the registry.
  smoke:
    name: Boot smoke test (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build amd64 image (load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: bombvault:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run container + health check
        run: |
          docker run -d --name bv-smoke \
            -e APP_KEY="$(openssl rand -hex 32)" \
            -e HTTP_ONLY=true \
            -p 3000:3000 bombvault:smoke
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "✓ container is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "✗ container did not become healthy in time"
          docker logs bv-smoke || true
          exit 1
      - name: Cleanup
        if: always()
        run: docker rm -f bv-smoke || true

  build:
    name: Build (amd64 + arm64)
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Push only on main / manual runs, never from pull requests.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=go-preview,enable=${{ github.ref == 'refs/heads/feat/go-rewrite' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
